# Site configuration. Edit and re-run the build; setup.py won't overwrite this.

[site-layout]
# Generate the sidebar nav on every build.
nav = false

# Override the homepage (README) title. Uncomment to use.
# front = "Home"

# Uncomment to render a copyright footer on every page.
# All three keys are required if the section is present.
# [copyright]
# author = "Your Name"
# year = 2026
# tag = "Licensed under [CC BY-NC 4.0](https://creativecommons.org/licenses/by-nc/4.0/)"

# Options for the standalone TOC builder (toc.py). Defaults shown.
# [toc-builder]
# max_depth = 6              # deepest heading level to list
# slug_style = "site"        # "site" (matches the website build) | "github"
# toc_title = "Table of Contents"
