# Site configuration. Edit and re-run the build; setup.py won't overwrite this.

[site-layout]
# Sidebar navigation mode:
#   "none"   - no sidebar.
#   "browse" - one sidebar for the whole site, as a collapsible folder tree.
#   "readme" - global sidebar links to each top-level directory's README; opening
#              one shows that directory's own tree (scoped), with a Home link back.
nav = "none"

# Override the homepage (README) title. Uncomment to use.
# home = "Home"

# Outbound-link bar atop a page. show is one of:
#   "disabled" - never render
#   "home"     - render on the homepage only.
#   "not home" - render on every page except the homepage.
# [header]
# show = "home"
# [[header.link]]
# name = "me.org"
# url = "https://me.org"
# [[header.link]]
# name = "Blog"
# url = "https://blog.me.org"

# Footer rendered on every page. Each line's text is markdown,.
# [footer]
# [[footer.line]]
# text = "© 2026 Your Name"
# [[footer.line]]
# text = "Licensed through [CC BY-NC 4.0](https://creativecommons.org/licenses/by-nc/4.0/)"

# Options for the standalone TOC builder (toc.py). Defaults shown.
# [toc-builder]
# max_depth = 6              # deepest heading level to list
# slug_style = "site"        # "site" (matches the website build) | "github"
# toc_title = "Table of Contents"

# Headings to leave out of numbering (headings.py). Matched by text.
# [exclude-headings]
# titles = ["Preface", "Appendix"]
